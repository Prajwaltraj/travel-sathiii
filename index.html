<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel-Sathiii | AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-container { height: calc(100vh - 160px); }
        .message-user { background: #3b82f6; color: white; align-self: flex-end; border-radius: 15px 15px 0 15px; }
        .message-bot { background: #f3f4f6; color: #1f2937; align-self: flex-start; border-radius: 15px 15px 15px 0; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-white shadow-sm p-4 flex justify-between items-center px-8">
        <h1 class="text-xl font-bold text-blue-600">Travel-Sathiii ✈️</h1>
        <div class="text-sm text-gray-500">FastAPI + Ollama</div>
    </nav>

    <main class="max-w-4xl mx-auto mt-6 p-4">
        <div id="chat-box" class="chat-container overflow-y-auto flex flex-col space-y-4 p-4 border rounded-xl bg-white shadow-inner">
            <div class="message-bot p-3 max-w-[80%]">
                Hello! I'm your Travel-Sathi. How can I help you plan your journey today?
            </div>
        </div>

        <div class="mt-4 flex gap-2">
            <input type="text" id="user-input" placeholder="Ask about destinations, hotels, or flights..." 
                class="flex-1 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
            <button onclick="sendMessage()" id="send-btn" 
                class="bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-blue-700 transition">
                Send
            </button>
        </div>
        
        <div id="status" class="text-xs text-gray-400 mt-2 ml-1 italic"></div>
    </main>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const status = document.getElementById('status');

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Append User Message
            appendMessage(message, 'user');
            userInput.value = '';
            status.innerText = "Sathiii is thinking...";

            try {
                const response = await fetch('http://localhost:8000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                
                // Append Bot Message
                appendMessage(data.reply, 'bot');
                status.innerText = "";

                // Play Voice Response
                if (data.audio_url) {
                    const audio = new Audio(data.audio_url);
                    audio.play();
                }
            } catch (error) {
                console.error("Error:", error);
                appendMessage("Sorry, I'm having trouble connecting to the server.", 'bot');
                status.innerText = "";
            }
        }

        function appendMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `p-3 max-w-[80%] ${sender === 'user' ? 'message-user' : 'message-bot'}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Allow "Enter" key to send
        userInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
